name: Desktop Packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            build_flag: --mac
            build_target: dmg
            artifact_name: desktop-django-starter-macos
            artifact_glob: electron/dist/*.dmg
          - os: windows-latest
            platform: windows
            build_flag: --win
            build_target: nsis
            artifact_name: desktop-django-starter-windows
            artifact_glob: electron/dist/*.exe
          - os: ubuntu-latest
            platform: linux
            build_flag: --linux
            build_target: AppImage
            artifact_name: desktop-django-starter-linux
            artifact_glob: electron/dist/*.AppImage

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Packaging uses the staged bundled runtime, while validation CI
          # continues to run on 3.13.
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Install Electron dependencies
        run: npm --prefix electron ci

      - name: Prepare macOS notarization API key
        if: matrix.platform == 'macos' && secrets.APPLE_API_KEY != ''
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          key_path="$RUNNER_TEMP/app-store-connect-api-key.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Build packaged desktop artifact
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WINDOWS_SIGNING_PUBLISHER: ${{ secrets.WINDOWS_SIGNING_PUBLISHER }}
          WIN_SIGN_CERT_SUBJECT_NAME: ${{ secrets.WIN_SIGN_CERT_SUBJECT_NAME }}
          WIN_SIGN_CERT_SHA1: ${{ secrets.WIN_SIGN_CERT_SHA1 }}
          WIN_SIGN_TIMESTAMP_URL: ${{ secrets.WIN_SIGN_TIMESTAMP_URL }}
          WIN_SIGN_TIMESTAMP_RFC3161_URL: ${{ secrets.WIN_SIGN_TIMESTAMP_RFC3161_URL }}
        run: npm --prefix electron run dist -- ${{ matrix.build_flag }} ${{ matrix.build_target }}

      - name: Upload packaged desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
