name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # CI intentionally runs on 3.13 while the project floor stays at 3.12
          # and RTD uses 3.12.
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest

      - name: Build docs
        run: uv run sphinx-build -M html docs docs/_build
