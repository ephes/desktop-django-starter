<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Desktop Django Starter{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
            line-height: 1.5;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f5f0e7 0%, #fffaf4 100%);
            color: #1f1a17;
        }

        .shell {
            max-width: 56rem;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        .masthead {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            margin-bottom: 2rem;
        }

        .masthead h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3rem);
        }

        .panel {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #decdbf;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 18px 40px rgba(80, 52, 32, 0.08);
        }

        .actions,
        .row-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        a,
        button {
            color: inherit;
        }

        .button,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #8b5e3c;
            border-radius: 999px;
            background: #8b5e3c;
            color: #fffaf4;
            padding: 0.6rem 1rem;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
        }

        .button.secondary,
        button.secondary {
            background: transparent;
            color: #8b5e3c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }

        th,
        td {
            padding: 0.75rem 0;
            border-bottom: 1px solid #eaded3;
            text-align: left;
            vertical-align: top;
        }

        form {
            display: grid;
            gap: 1rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid #cdb7a3;
            border-radius: 0.75rem;
            padding: 0.75rem;
            font: inherit;
            box-sizing: border-box;
            background: #fffdf9;
        }

        textarea {
            min-height: 8rem;
        }

        .status {
            font-size: 0.95rem;
            color: #6e5745;
            min-height: 1.2rem;
        }

        .empty {
            padding: 1rem 0;
            color: #6e5745;
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="masthead">
            <div>
                <p>Desktop Django Starter</p>
                <h1>{% block heading %}Items{% endblock %}</h1>
            </div>
            <div class="actions">
                <button class="secondary" type="button" data-open-app-data hidden>Open App Data Folder</button>
            </div>
        </header>
        <section class="panel">
            {% block content %}{% endblock %}
            <p class="status" data-native-status></p>
        </section>
    </main>
    <script>
        const appDataButton = document.querySelector("[data-open-app-data]");
        const nativeStatus = document.querySelector("[data-native-status]");

        if (appDataButton && window.desktop && window.desktop.openAppDataDirectory) {
            appDataButton.hidden = false;
            appDataButton.addEventListener("click", async () => {
                try {
                    const result = await window.desktop.openAppDataDirectory();
                    nativeStatus.textContent = result && result.path
                        ? `Opened ${result.path}`
                        : "App data folder opened.";
                } catch (error) {
                    nativeStatus.textContent = error instanceof Error ? error.message : "Unable to open the app data folder.";
                }
            });
        }
    </script>
</body>
</html>
