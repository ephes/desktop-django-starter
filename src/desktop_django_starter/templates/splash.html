<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flying Stable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap"
        media="print"
        onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap">
    </noscript>
    <style>
        :root {
            --teal-bright: #4FC0BC;
            --teal-deep: #108D82;
            --teal-dark: #0A544E;
            --dark: #222121;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark);
            color: var(--teal-bright);
            font-family: "Play", "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .splash-logo {
            width: 10rem;
            height: 10rem;
            animation: breathe 2.5s ease-in-out infinite;
        }

        .splash-title {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .splash-loader {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .splash-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: var(--teal-bright);
            animation: bounce 1.4s ease-in-out infinite;
        }

        .splash-dot:nth-child(2) { animation-delay: 0.2s; }
        .splash-dot:nth-child(3) { animation-delay: 0.4s; }

        .splash-status {
            font-size: 0.85rem;
            color: rgba(79, 192, 188, 0.5);
            letter-spacing: 0.05em;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-0.5rem); opacity: 1; }
        }
    </style>
</head>
