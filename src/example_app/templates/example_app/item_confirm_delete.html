{% extends "base.html" %}

{% block title %}Release Pony | Flying Stable{% endblock %}
{% block heading %}Release Pony{% endblock %}

{% block content %}
<div class="confirm-delete">
    <p>Release <strong>{{ object.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button type="submit" class="danger">Release Pony</button>
            <a class="button secondary" href="{% url 'example_app:item-list' %}">Keep It</a>
        </div>
    </form>
</div>
{% endblock %}
